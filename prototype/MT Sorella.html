le=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:#0A9D5A;margin-top:7px;flex-shrink:0\"><\u002Fspan><div style=\"font-size:14.5px;color:#46544c;line-height:1.6\">Spojenie značky s hodnotami športu, disciplíny a mládeže.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:14px\"><span style=\"display:inline-block;width:8px;height:8px;border-radius:50%;background:#0A9D5A;margin-top:7px;flex-shrink:0\"><\u002Fspan><div style=\"font-size:14.5px;color:#46544c;line-height:1.6\">Prezentácia na súťažiach a vystúpeniach po celom Slovensku.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:24px;display:flex;gap:20px;padding-top:22px;border-top:1px solid rgba(4,123,70,.1)\">\n            <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:700;color:#047b46\">6<\u002Fdiv><div style=\"font-size:12.5px;color:#9aa89f\">súčasných partnerov<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:700;color:#047b46\">38<\u002Fdiv><div style=\"font-size:12.5px;color:#9aa89f\">súťaží ročne<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(24px,3vw,36px);border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.1);box-shadow:0 18px 44px -26px rgba(16,40,28,.24)\">\n          <sc-if value=\"{{ formPartner.notSent }}\" hint-placeholder-val=\"{{ true }}\">\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;color:#14211b\">Mám záujem o spoluprácu<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:18px\">\n            <input placeholder=\"Názov firmy / meno\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <input placeholder=\"Kontaktná osoba\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <div style=\"display:flex;gap:12px\">\n              <input placeholder=\"E-mail\" style=\"flex:1;min-width:0;padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <input placeholder=\"Telefón\" style=\"flex:1;min-width:0;padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <\u002Fdiv>\n            <select style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;color:#14211b;outline:none\"><option>Forma spolupráce<\u002Foption><option>Finančná podpora<\u002Foption><option>Materiálna podpora<\u002Foption><option>Mediálne partnerstvo<\u002Foption><option>Iná<\u002Foption><\u002Fselect>\n            <textarea placeholder=\"Vaša správa\" rows=\"4\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none;resize:vertical\"><\u002Ftextarea>\n            <button onclick=\"{{ formPartner.send }}\" style=\"margin-top:6px;padding:15px;border-radius:12px;font-size:15px;font-weight:600;color:#fff;background:#047b46;box-shadow:0 10px 26px -10px rgba(4,123,70,.6);transition:background .2s\" style-hover=\"background:#035C34\">Odoslať dopyt<\u002Fbutton>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ formPartner.sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:32px 12px\">\n            <span style=\"display:grid;place-items:center;width:64px;height:64px;border-radius:50%;background:rgba(10,157,90,.16);font-size:30px\">✓<\u002Fspan>\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:600;color:#14211b\">Ďakujeme za dopyt!<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.6;color:#5a6b62;max-width:340px\">Vaša správa bola odoslaná. Ozveme sa vám s návrhom spolupráce čo najskôr.<\u002Fp>\n            <button onclick=\"{{ formPartner.reset }}\" style=\"margin-top:6px;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;color:#047b46;border:1px solid rgba(4,123,70,.2)\">Odoslať ďalší dopyt<\u002Fbutton>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== PRIHLÁSENIE ===================== -->\n    <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"min-height:calc(100vh - 74px);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));opacity:1\">\n      <sc-if value=\"{{ showDesktopNav }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:relative;min-height:100%;background:repeating-linear-gradient(125deg,#0a6b41 0 30px,#0c7547 30px 60px)\">\n        <div style=\"position:absolute;inset:0;background:linear-gradient(150deg,rgba(3,68,40,.9),rgba(4,123,70,.45))\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:56px;color:#fff\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:#9FE3C2\">Členská zóna<\u002Fdiv>\n          <h2 style=\"margin-top:16px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(32px,3.6vw,46px);font-weight:600;line-height:1.05\">Vitaj späť,<br>Sorella<\u002Fh2>\n          <p style=\"margin-top:14px;font-size:16px;color:rgba(255,255,255,.85);max-width:360px\">Tvoj dashboard, tréningy, výzvy a rebríček čakajú. Prihlás sa cez e-mail rodiča.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:flex;align-items:center;justify-content:center;padding:clamp(32px,6vw,64px)\">\n        <div style=\"width:100%;max-width:380px\">\n          <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:600;color:#14211b\">Prihlásenie<\u002Fh1>\n          <p style=\"margin-top:8px;font-size:14.5px;color:#5a6b62\">Vstup len pre členky tímu.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:28px\">\n            <div>\n              <label style=\"font-size:13px;font-weight:600;color:#46544c\">E-mail rodiča<\u002Flabel>\n              <input value=\"rodic@email.sk\" style=\"margin-top:6px;width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font-size:13px;font-weight:600;color:#46544c\">Heslo<\u002Flabel>\n              <input type=\"password\" value=\"123456\" style=\"margin-top:6px;width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <\u002Fdiv>\n            <button onclick=\"{{ doLogin }}\" style=\"margin-top:6px;padding:15px;border-radius:12px;font-size:15px;font-weight:600;color:#fff;background:#047b46;box-shadow:0 10px 26px -10px rgba(4,123,70,.6);transition:background .2s\" style-hover=\"background:#035C34\">Prihlásiť sa<\u002Fbutton>\n            <button style=\"font-size:13.5px;color:#9aa89f;text-align:center;margin-top:2px\">Zabudla si heslo?<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin-top:28px;padding:16px;border-radius:14px;background:rgba(10,157,90,.1);border:1px solid rgba(10,157,90,.3);font-size:13px;line-height:1.6;color:#46544c\">Registrácia nie je verejná. Účty vytvára tréner. Pre demo stačí kliknúť „Prihlásiť sa\".<\u002Fdiv>\n          <div style=\"margin-top:18px;padding-top:18px;border-top:1px solid rgba(4,123,70,.1);text-align:center\">\n            <button onclick=\"{{ loginAdmin }}\" style=\"font-size:13.5px;font-weight:600;color:#047b46;border-bottom:1.5px solid #0A9D5A;padding-bottom:2px\">Vstup pre trénerky → Admin panel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== DASHBOARD ===================== -->\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(28px,4vw,52px) clamp(20px,4vw,64px) 64px;opacity:1\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px\">\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#047b46;font-weight:600\">Členská zóna<\u002Fdiv>\n          <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,4.4vw,48px);font-weight:600;color:#14211b\">Ahoj, {{ me.nick }}<\u002Fh1>\n          <p style=\"margin-top:6px;font-size:15px;color:#5a6b62\">Tu je tvoj dnešný prehľad — čo ťa čaká a čo treba vybaviť.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ goProfileNav }}\" style=\"display:flex;align-items:center;gap:10px;padding:8px 16px 8px 8px;border-radius:999px;background:#fff;border:1px solid rgba(4,123,70,.14);font-size:13.5px;font-weight:600;color:#14211b;transition:transform .2s\" style-hover=\"transform:translateY(-1px)\">\n          <span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0A9D5A,#047b46);color:#fff;font-size:12px;font-weight:700\">{{ meInitials }}<\u002Fspan>\n          Môj profil ›\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- SLIM STATS STRIP -->\n      <div style=\"margin-top:26px;display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px\">\n        <sc-for list=\"{{ dashStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;align-items:center;gap:13px;padding:16px 18px;border-radius:16px;background:#fff;border:1px solid rgba(4,123,70,.1)\">\n            \n            <div style=\"min-width:0\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:23px;font-weight:700;color:#14211b;line-height:1.1\">{{ st.val }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#9aa89f\">{{ st.label }} · {{ st.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- ACTION CARDS -->\n      <div style=\"margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:20px\">\n\n        <!-- NEXT TRAINING -->\n        <div style=\"min-width:0;border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:26px\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#047b46;font-weight:600\">Najbližší tréning<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:16px\">\n            <div style=\"flex:1;min-width:200px\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;color:#14211b\">{{ nextTraining.date }} · {{ nextTraining.time }}<\u002Fdiv>\n              <div style=\"margin-top:4px;font-size:14px;color:#5a6b62\">{{ nextTraining.place }}<\u002Fdiv>\n              <div style=\"margin-top:8px;font-size:13px;color:#9aa89f\">Prines: {{ nextTraining.bring }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px\">\n              <button onclick=\"{{ nextTraining.setYes }}\" style=\"padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;background:{{ nextTraining.yesBg }};color:{{ nextTraining.yesColor }};border:1.5px solid #047b46;transition:all .2s\">Prídem<\u002Fbutton>\n              <button onclick=\"{{ nextTraining.setNo }}\" style=\"padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;background:{{ nextTraining.noBg }};color:{{ nextTraining.noColor }};border:1.5px solid rgba(194,69,58,.4);transition:all .2s\">Neprídem<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ACTIVE CHALLENGES -->\n        <div style=\"min-width:0;border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:26px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#047b46;font-weight:600\">Aktívne výzvy<\u002Fspan><\u002Fdiv>\n            <button onclick=\"{{ goChallengesNav }}\" style=\"font-size:13px;font-weight:600;color:#047b46\">Všetky ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ dashChallenges }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ c.open }}\" style=\"text-align:left;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;background:#FAF9F6;border:1px solid rgba(4,123,70,.08);transition:transform .2s\" style-hover=\"transform:translateX(4px)\">\n                \n                <div style=\"flex:1\">\n                  <div style=\"font-size:15px;font-weight:600;color:#14211b\">{{ c.title }}<\u002Fdiv>\n                  <div style=\"margin-top:2px;font-size:12.5px;color:#9aa89f\">Termín: {{ c.deadline }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;color:#047b46;background:rgba(10,157,90,.16)\">+{{ c.points }} b<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TEAM GOAL -->\n        <div style=\"min-width:0;border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:26px\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#047b46;font-weight:600\">Tímový cieľ<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">{{ teamGoal.title }}<\u002Fdiv>\n          <div style=\"margin-top:16px;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:700;color:#047b46\">{{ teamGoal.currentFmt }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#9aa89f\">/ {{ teamGoal.targetFmt }} b<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:relative;height:12px;border-radius:999px;background:#eef2ef;overflow:hidden\">\n            <div style=\"position:absolute;inset:0;width:{{ teamGoal.pct }}%;background:linear-gradient(90deg,#0A9D5A,#047b46);border-radius:999px\"><\u002Fdiv>\n            <div style=\"position:absolute;top:0;bottom:0;left:calc({{ teamGoal.pct }}% - 3px);width:3px;background:#0A9D5A\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ANNOUNCEMENTS -->\n        <div style=\"min-width:0;border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:26px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#047b46;font-weight:600\">Nástenka<\u002Fspan><\u002Fdiv>\n            <button onclick=\"{{ goBoardNav }}\" style=\"font-size:13px;font-weight:600;color:#047b46\">Otvoriť ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ dashAnns }}\" as=\"a\" hint-placeholder-count=\"2\">\n              <div style=\"padding-bottom:14px;border-bottom:1px solid rgba(4,123,70,.07)\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;color:{{ a.tColor }};background:{{ a.tBg }}\">{{ a.tag }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#9aa89f\">{{ a.date }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:8px;font-size:15px;font-weight:600;color:#14211b\">{{ a.title }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== TRÉNINGY ===================== -->\n    <sc-if value=\"{{ isTrainings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:980px;margin:0 auto;padding:clamp(28px,4vw,52px) clamp(20px,4vw,48px) 64px;opacity:1\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#047b46;font-weight:600\">Rozpis<\u002Fdiv>\n      <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600;color:#14211b\">Tréningy<\u002Fh1>\n      <p style=\"margin-top:10px;font-size:15px;color:#5a6b62\">Potvrď účasť na nadchádzajúcich tréningoch. Za účasť získaš +2 body.<\u002Fp>\n\n      <!-- KALENDÁR -->\n      <div style=\"margin-top:24px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:clamp(18px,3vw,26px)\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#14211b\">{{ calMonthName }}<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px\">\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6b62\"><span style=\"width:8px;height:8px;border-radius:50%;background:#047b46\"><\u002Fspan>Tréning<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6b62\"><span style=\"width:8px;height:8px;border-radius:50%;background:#6FC59A\"><\u002Fspan>Vystúpenie<\u002Fspan>\n            <button onclick=\"{{ exportAllTrainings }}\" style=\"padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;color:#047b46;border:1px solid rgba(4,123,70,.22);transition:background .2s\" style-hover=\"background:rgba(4,123,70,.06)\">Export do kalendára (.ics)<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px\">\n          <sc-for list=\"{{ calWeekdays }}\" as=\"w\" hint-placeholder-count=\"7\"><div style=\"text-align:center;font-size:11px;font-weight:600;color:#9aa89f;padding-bottom:4px\">{{ w }}<\u002Fdiv><\u002Fsc-for>\n          <sc-for list=\"{{ calendar }}\" as=\"c\" hint-placeholder-count=\"35\">\n            <sc-if value=\"{{ c.empty }}\" hint-placeholder-val=\"{{ false }}\"><div><\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ c.show }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:{{ c.bg }};border:{{ c.border }}\">\n                <span style=\"font-size:13px;font-weight:{{ c.weight }};color:#14211b\">{{ c.label }}<\u002Fspan>\n                <div style=\"display:flex;gap:3px;height:6px\">\n                  <sc-if value=\"{{ c.hasTraining }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:#047b46\"><\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ c.hasEvent }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:#6FC59A\"><\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:14px\">\n        <sc-for list=\"{{ trainingsList }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:18px;padding:22px 24px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.1)\">\n            <div style=\"flex-shrink:0;text-align:center;width:58px;padding:12px 0;border-radius:13px;background:rgba(4,123,70,.06)\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#047b46;line-height:1\">{{ t.day }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#9aa89f;margin-top:2px\">{{ t.date }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:200px\">\n              <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px\">\n                <span style=\"font-size:16px;font-weight:600;color:#14211b\">{{ t.time }}<\u002Fspan>\n                <span style=\"padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:600;color:{{ t.cc }};background:{{ t.cbg }}\">{{ t.cat }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:5px;font-size:14px;color:#5a6b62\">{{ t.place }}<\u002Fdiv>\n              <div style=\"margin-top:3px;font-size:12.5px;color:#9aa89f\">Prines: {{ t.bring }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px\">\n              <button onclick=\"{{ t.setYes }}\" style=\"padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;background:{{ t.yesBg }};color:{{ t.yesColor }};border:1.5px solid #047b46;transition:all .2s\">Prídem<\u002Fbutton>\n              <button onclick=\"{{ t.setNo }}\" style=\"padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;background:{{ t.noBg }};color:{{ t.noColor }};border:1.5px solid rgba(194,69,58,.35);transition:all .2s\">Neprídem<\u002Fbutton>\n              <button onclick=\"{{ t.ics }}\" title=\"Pridať do kalendára\" style=\"padding:11px 14px;border-radius:11px;font-size:13.5px;font-weight:600;color:#047b46;border:1.5px solid rgba(4,123,70,.18);transition:background .2s\" style-hover=\"background:rgba(4,123,70,.06)\">+ Kalendár<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== NÁSTENKA ===================== -->\n    <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:820px;margin:0 auto;padding:clamp(28px,4vw,52px) clamp(20px,4vw,40px) 64px;opacity:1\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#047b46;font-weight:600\">Oznamy<\u002Fdiv>\n      <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600;color:#14211b\">Nástenka<\u002Fh1>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:22px\">\n        <sc-for list=\"{{ boardFilters }}\" as=\"f\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ f.pick }}\" style=\"padding:9px 18px;border-radius:999px;font-size:14px;font-weight:600;background:{{ f.bg }};color:{{ f.color }};border:1px solid {{ f.bd }};transition:all .2s\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:16px\">\n        <sc-for list=\"{{ boardList }}\" as=\"a\" hint-placeholder-count=\"3\">\n          <div style=\"padding:24px 26px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.1);border-left:{{ a.pinBorder }}\">\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n              <sc-if value=\"{{ a.pinned }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;color:#047b46;background:rgba(4,123,70,.1)\">Pripnuté<\u002Fspan><\u002Fsc-if>\n              <span style=\"padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:600;color:{{ a.tColor }};background:{{ a.tBg }}\">{{ a.tag }}<\u002Fspan>\n              <span style=\"font-size:12.5px;color:#9aa89f;margin-left:auto\">{{ a.date }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"margin-top:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:600;color:#14211b\">{{ a.title }}<\u002Fh3>\n            <p style=\"margin-top:8px;font-size:15px;line-height:1.65;color:#46544c\">{{ a.body }}<\u002Fp>\n            <div style=\"margin-top:16px;display:flex;gap:10px\">\n              <button onclick=\"{{ a.like }}\" style=\"display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:{{ a.likeColor }};background:{{ a.likeBg }};transition:all .2s\">👍 {{ a.likeN }}<\u002Fbutton>\n              <button onclick=\"{{ a.heart }}\" style=\"display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;color:{{ a.heartColor }};background:{{ a.heartBg }};transition:all .2s\">❤️ {{ a.heartN }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== VÝZVY ===================== -->\n    <sc-if value=\"{{ isChallenges }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:clamp(28px,4vw,52px) clamp(20px,4vw,48px) 64px;opacity:1\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#047b46;font-weight:600\">Gamifikácia<\u002Fdiv>\n      <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600;color:#14211b\">Tréningové výzvy<\u002Fh1>\n      <p style=\"margin-top:10px;font-size:15px;color:#5a6b62\">Pozri inštruktážne video, nahraj svoje a získaj body. Za splnenie +10 b, pred termínom +5 b.<\u002Fp>\n\n      <h2 style=\"margin-top:34px;margin-bottom:16px;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;color:#14211b\">Aktívne výzvy<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px\">\n        <sc-for list=\"{{ challengesActive }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <div style=\"border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.1);overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"position:relative;aspect-ratio:16/9;background:repeating-linear-gradient(135deg,#1c3528 0 16px,#16291f 16px 32px)\">\n              <div style=\"position:absolute;inset:0;display:grid;place-items:center\"><span style=\"display:grid;place-items:center;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);font-size:22px;color:#fff\">▶<\u002Fspan><\u002Fdiv>\n              <div style=\"position:absolute;top:12px;left:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);text-transform:uppercase\">[ inštruktážne video ]<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:20px;display:flex;flex-direction:column;flex:1\">\n              <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"padding:4px 11px;border-radius:999px;font-size:11px;font-weight:600;color:{{ c.sColor }};background:{{ c.sBg }}\">{{ c.sLabel }}<\u002Fspan><span style=\"font-size:12px;color:#9aa89f\">{{ c.cat }}<\u002Fspan><\u002Fdiv>\n              <h3 style=\"margin-top:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">{{ c.title }}<\u002Fh3>\n              <p style=\"margin-top:8px;font-size:14px;line-height:1.6;color:#5a6b62;flex:1\">{{ c.desc }}<\u002Fp>\n              <div style=\"margin-top:16px;display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"font-size:13px;color:#9aa89f\">{{ c.deadline }} · <span style=\"color:#047b46;font-weight:700\">+{{ c.points }} b<\u002Fspan><\u002Fdiv>\n                <button onclick=\"{{ c.open }}\" style=\"padding:10px 18px;border-radius:11px;font-size:13.5px;font-weight:600;color:#fff;background:#047b46;transition:background .2s\" style-hover=\"background:#035C34\">Nahrať video<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h2 style=\"margin-top:44px;margin-bottom:16px;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;color:#14211b\">História výziev<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ challengesDone }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:14px;padding:18px 20px;border-radius:14px;background:#fff;border:1px solid rgba(4,123,70,.08)\">\n            \n            <div style=\"flex:1;min-width:180px\">\n              <div style=\"font-size:15px;font-weight:600;color:#14211b\">{{ c.title }}<\u002Fdiv>\n              <div style=\"margin-top:2px;font-size:12.5px;color:#9aa89f\">{{ c.cat }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ c.scoreTxt }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;color:#047b46\">{{ c.scoreTxt }}<\u002Fspan><\u002Fsc-if>\n            <span style=\"padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:600;color:{{ c.sColor }};background:{{ c.sBg }}\">{{ c.sLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== REBRÍČEK ===================== -->\n    <sc-if value=\"{{ isLeaderboard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:linear-gradient(160deg,#047b46,#035C34);color:#fff;padding:clamp(32px,4vw,56px) clamp(20px,4vw,64px) clamp(48px,6vw,80px)\">\n        <div style=\"max-width:980px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#9FE3C2;font-weight:600\">Rebríček<\u002Fdiv>\n          <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600\">Sieň slávy<\u002Fh1>\n          <div style=\"display:inline-flex;margin-top:22px;padding:4px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)\">\n            <button onclick=\"{{ setLbSeason }}\" style=\"padding:9px 20px;border-radius:999px;font-size:13.5px;font-weight:600;color:{{ lbSeasonColor }};background:{{ lbSeasonBg }};transition:all .2s\">Sezónny<\u002Fbutton>\n            <button onclick=\"{{ setLbAll }}\" style=\"padding:9px 20px;border-radius:999px;font-size:13.5px;font-weight:600;color:{{ lbAllColor }};background:{{ lbAllBg }};transition:all .2s\">Celoživotný<\u002Fbutton>\n          <\u002Fdiv>\n          <!-- PODIUM -->\n          <div style=\"margin-top:40px;display:flex;align-items:flex-end;justify-content:center;gap:clamp(10px,3vw,28px)\">\n            <sc-for list=\"{{ podium }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;width:clamp(92px,26vw,150px)\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;color:#fff\">{{ p.medal }}<\u002Fdiv>\n                <div style=\"position:relative;width:64px;height:64px;border-radius:50%;margin:8px 0;border:3px solid {{ p.ring }};background:repeating-linear-gradient(135deg,rgba(255,255,255,.2) 0 8px,rgba(255,255,255,.1) 8px 16px);display:grid;place-items:center;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;color:#fff\">{{ p.initials }}<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:700;color:#fff\">{{ p.nick }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(255,255,255,.7)\">{{ p.cat }}<\u002Fdiv>\n                <div style=\"margin-top:10px;width:100%;height:{{ p.h }}px;border-radius:14px 14px 0 0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-bottom:none;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:14px\">\n                  <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;color:#9FE3C2\">{{ p.points }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:rgba(255,255,255,.7)\">bodov<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:980px;margin:0 auto;padding:clamp(32px,4vw,56px) clamp(20px,4vw,64px) 64px\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px\">\n          <sc-for list=\"{{ lbCatChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ c.pick }}\" style=\"padding:8px 16px;border-radius:999px;font-size:13.5px;font-weight:600;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.bd }};transition:all .2s\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.1);overflow:hidden\">\n          <sc-for list=\"{{ lbList }}\" as=\"m\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid rgba(4,123,70,.07);background:{{ m.rowBg }}\">\n              <span style=\"width:28px;font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:700;color:{{ m.rankColor }}\">{{ m.rank }}<\u002Fspan>\n              <span style=\"display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#0A9D5A,#047b46);color:#fff;font-size:14px;font-weight:700\">{{ m.initials }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:15.5px;font-weight:700;color:#14211b\">{{ m.nick }}<\u002Fspan><sc-if value=\"{{ m.isMe }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;color:#047b46;background:rgba(4,123,70,.1)\">TY<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:6px;margin-top:3px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ m.dot }}\"><\u002Fspan><span style=\"font-size:12px;color:#9aa89f\">{{ m.levelName }} · {{ m.cat }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#047b46\
