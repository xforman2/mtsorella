document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d520e998-86d0-4d43-80b6-77ba7d0299b8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html{scroll-behavior:smooth}\n  body{font-family:'Inter',system-ui,sans-serif;color:#1A1A1A;background:#FAF9F6;-webkit-font-smoothing:antialiased}\n  ::selection{background:#047b46;color:#fff}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer;border:none;background:none}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}\n  @keyframes fadeIn{from{opacity:0}to{opacity:1}}\n  @keyframes flame{0%,100%{transform:scale(1) rotate(-2deg);opacity:.92}50%{transform:scale(1.12) rotate(2deg);opacity:1}}\n  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}\n  @keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#cdd6d0;border-radius:8px}\n  image-slot{display:block}\n<\u002Fstyle>\n<script src=\"43b8a841-b830-4c0c-8230-7e888b95904a\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#FAF9F6;{{ appPad }}\">\n\n  <!-- ===================== ADMIN PANEL ===================== -->\n  <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;min-height:100vh;background:#F2F4F1\">\n    <!-- SIDEBAR (desktop) -->\n    <sc-if value=\"{{ adminDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n    <aside style=\"width:258px;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:#0a1f15;color:#fff;padding:22px 14px\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:6px 8px 24px\">\n        <span style=\"display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:#047b46;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700\">S<\u002Fspan>\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:600;line-height:1\">MT&nbsp;Sorella<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:10px;letter-spacing:.26em;color:#9FE3C2;margin-top:2px\">ADMIN PANEL<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <nav style=\"flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ adminNav }}\" as=\"item\" hint-placeholder-count=\"12\">\n          <button onclick=\"{{ item.go }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;font-size:14px;font-weight:600;text-align:left;color:{{ item.sideColor }};background:{{ item.sideBg }}\">\n            {{ item.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n      <button onclick=\"{{ logout }}\" style=\"display:flex;align-items:center;gap:10px;margin-top:8px;padding:12px;border-radius:11px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06)\">← Späť na web<\u002Fbutton>\n    <\u002Faside>\n    <\u002Fsc-if>\n\n    <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n      <!-- TOPBAR -->\n      <header style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 clamp(18px,3vw,40px);height:68px;background:#fff;border-bottom:1px solid rgba(16,40,28,.08);position:sticky;top:0;z-index:30\">\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#9aa89f\">Administrácia<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:600;color:#14211b;line-height:1.1\">{{ adminTitle }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <div style=\"display:flex;align-items:center;gap:9px;padding:6px 14px 6px 7px;border-radius:999px;background:#FAF9F6;border:1px solid rgba(16,40,28,.08)\">\n            <span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0A9D5A,#047b46);color:#fff;font-size:12px;font-weight:700\">{{ adminUserInit }}<\u002Fspan>\n            <div style=\"line-height:1.1\"><div style=\"font-size:13px;font-weight:600;color:#14211b\">{{ adminUser }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa89f\">Hlavná trénerka<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- MOBILE admin nav -->\n      <sc-if value=\"{{ adminMobile }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;gap:8px;overflow-x:auto;padding:12px 16px;background:#fff;border-bottom:1px solid rgba(16,40,28,.06)\">\n        <sc-for list=\"{{ adminNav }}\" as=\"item\" hint-placeholder-count=\"9\">\n          <button onclick=\"{{ item.go }}\" style=\"flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;color:{{ item.chipColor }};background:{{ item.chipBg }};white-space:nowrap\">{{ item.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"padding:clamp(20px,3vw,40px);width:100%;max-width:1120px\">\n\n        <!-- ADMIN: PREHĽAD -->\n        <sc-if value=\"{{ isADash }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px\">\n            <sc-for list=\"{{ adminStatCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"padding:22px;border-radius:16px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n                \n                <div style=\"margin-top:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:34px;font-weight:700;color:#14211b;line-height:1\">{{ c.num }}<\u002Fdiv>\n                <div style=\"margin-top:4px;font-size:13px;color:#5a6b62\">{{ c.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px\">\n            <div style=\"padding:24px;border-radius:18px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;color:#14211b\">Nové prihlášky<\u002Fh3><button onclick=\"{{ go_a_members }}\" style=\"font-size:13px;font-weight:600;color:#047b46\">Všetky ›<\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ applicationsList }}\" as=\"a\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#FAF9F6\">\n                    <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:600;color:#14211b\">{{ a.child }} ({{ a.age }} r.)<\u002Fdiv><div style=\"font-size:12px;color:#9aa89f\">{{ a.parent }} · {{ a.cat }} · {{ a.date }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"padding:4px 11px;border-radius:999px;font-size:11px;font-weight:600;color:{{ a.statusColor }};background:{{ a.statusBg }}\">{{ a.statusLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:24px;border-radius:18px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\"><h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;color:#14211b\">Videá na hodnotenie<\u002Fh3><button onclick=\"{{ go_a_videos }}\" style=\"font-size:13px;font-weight:600;color:#047b46\">Hodnotiť ›<\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <sc-for list=\"{{ pendingVideosList }}\" as=\"v\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#FAF9F6\">\n                    <span style=\"display:grid;place-items:center;width:36px;height:36px;border-radius:9px;background:#1c3528;color:#fff;font-size:13px\">▶<\u002Fspan>\n                    <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:600;color:#14211b\">{{ v.nick }} · {{ v.challenge }}<\u002Fdiv><div style=\"font-size:12px;color:#9aa89f\">{{ v.when }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADMIN: ČLENOVIA -->\n        <sc-if value=\"{{ isAMembers }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:24px\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px\">\n            <p style=\"font-size:14px;color:#5a6b62;max-width:520px\">Účty členiek vytvára výhradne admin. Prihlasovanie prebie =\"font-size:15px;font-weight:600;color:#14211b\">{{ v.challenge }}<\u002Fdiv>\n                  <div style=\"margin-top:3px;font-size:12.5px;color:#9aa89f\">{{ v.cat }} · odoslané {{ v.when }}<\u002Fdiv>\n                  <div style=\"margin-top:18px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:13px;font-weight:600;color:#46544c\">Kvalita prevedenia<\u002Fspan><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:700;color:#047b46\">{{ v.sel }}<span style=\"font-size:13px;color:#9aa89f\">/20<\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <input type=\"range\" min=\"0\" max=\"20\" value=\"{{ v.sel }}\" oninput=\"{{ v.setSel }}\" style=\"width:100%;margin-top:10px;accent-color:#047b46\">\n                  <button onclick=\"{{ v.save }}\" style=\"width:100%;margin-top:16px;padding:12px;border-radius:11px;font-size:14px;font-weight:600;color:#fff;background:#047b46;transition:background .2s\" style-hover=\"background:#035C34\">Prideliť body (+{{ v.sel }} a +10)<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ gradedVideosList }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:6px\">\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;color:#14211b;margin-bottom:12px\">Ohodnotené dnes<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ gradedVideosList }}\" as=\"v\" hint-placeholder-count=\"1\">\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:13px;background:#fff;border:1px solid rgba(4,123,70,.14)\">\n                  <span style=\"display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:rgba(4,123,70,.1);font-size:17px\">✓<\u002Fspan>\n                  <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:600;color:#14211b\">{{ v.nick }} · {{ v.challenge }}<\u002Fdiv><div style=\"font-size:12px;color:#9aa89f\">Kvalita {{ v.quality }}/20 + 10 za splnenie<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:#047b46\">+{{ v.total }} b<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADMIN: VÝZVY -->\n        <sc-if value=\"{{ isAChallenges }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;align-items:start\">\n          <div style=\"padding:26px;border-radius:18px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">Nová výzva<\u002Fh3>\n            <sc-if value=\"{{ formChallenge.notSent }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:18px\">\n              <input placeholder=\"Názov výzvy\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <textarea placeholder=\"Popis a inštrukcie\" rows=\"3\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none;resize:vertical\"><\u002Ftextarea>\n              <div style=\"display:flex;gap:12px\">\n                <input placeholder=\"Termín\" style=\"flex:1;min-width:0;padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n                <input placeholder=\"Body\" ap:14px;padding:16px 18px;border-radius:14px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n                  \n                  <div style=\"flex:1\"><div style=\"font-size:14.5px;font-weight:600;color:#14211b\">{{ c.title }}<\u002Fdiv><div style=\"font-size:12px;color:#9aa89f\">Termín {{ c.deadline }} · +{{ c.points }} b<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:12.5px;color:#9aa89f\">Upraviť<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADMIN: TRÉNINGY -->\n        <sc-if value=\"{{ isATrainings }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;align-items:start\">\n          <div style=\"padding:26px;border-radius:18px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b;margin-bottom:18px\">Pridať tréning<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:13px\">\n              <div style=\"display:flex;gap:12px\"><input placeholder=\"Dátum\" style=\"flex:1;min-width:0;padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\"><input placeholder=\"Čas\" style=\"flex:1;min-width:0;padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\"><\u002Fdiv>\n              <input placeholder=\"Miesto\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <input placeholder=\"Kategória\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <label style=\"display:flex;align-items:center;gap:9px;font-size:13.5px;color:#46544c\"><input type=\"checkbox\" style=\"width:16px;height:16px;accent-color:#047b46\"> Opakujúci sa tréning<\u002Flabel>\n              <button style=\"margin-top:4px;padding:13px;border-radius:11px;font-size:14.5px;font-weight:600;color:#fff;background:#047b46\">Pridať do rozpisu<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;color:#14211b;margin-bottom:14px\">Rozpis tréningov<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ trainingsList }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:13px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n                  <div style=\"text-align:center;width:50px;flex-shrink:0\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:#047b46\">{{ t.day }}<\u002Fdiv><div style=\"font-size:11px;color:#9aa89f\">{{ t.date }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:600;color:#14211b\">{{ t.time }} · {{ t.cat }}<\u002Fdiv><div style=\"font-size:12px;color:#9aa89f\">{{ t.place }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:12.5px;color:#9aa89f\">Upraviť<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADMIN: NÁSTENKA -->\n        <sc-if value=\"{{ isABoard }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;align-items:start\">\n          <div style=\"padding:26px; iv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:600;color:#14211b;margin-bottom:14px\">Publikované oznamy<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ boardList }}\" as=\"a\" hint-placeholder-count=\"3\">\n                <div style=\"padding:16px 18px;border-radius:13px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n                  <div style=\"display:flex;align-items:center;gap:8px\"><sc-if value=\"{{ a.pinned }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;color:#047b46;background:rgba(4,123,70,.1)\">Pripnuté<\u002Fspan><\u002Fsc-if><span style=\"font-size:14px;font-weight:600;color:#14211b\">{{ a.title }}<\u002Fspan><span style=\"margin-left:auto;font-size:12px;color:#9aa89f\">{{ a.date }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ADMIN: MAZORETKA & CIELE -->\n        <sc-if value=\"{{ isAMotm }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;align-items:start\">\n          <div style=\"padding:26px;border-radius:18px;background:#fff;border:1px solid rgba(16,40,28,.07)\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">Mazoretka mesiaca<\u002Fh3><\u002Fdiv>\n            <p style=\"margin-top:8px;font-size:13.5px;color:#5a6b62\">Vyber členku na zverejnenie na domovskej stránke.<\u002Fp>\n            <div style=\"margin-top:16px;display:flex;align-items:center;gap:14px;padding:16px;border-radius:13px;background:rgba(10,157,90,.08) n            <sc-if value=\"{{ formEvent.notSent }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:18px\">\n              <input placeholder=\"Názov vystúpenia\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <div style=\"display:flex;gap:12px\"><input placeholder=\"Dátum\" style=\"flex:1;min-width:0;padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\"><input placeholder=\"Čas\" style=\"flex:1;min-width:0;padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\"><\u002Fdiv>\n              <input placeholder=\"Miesto\" style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <select style=\"padding:13px 15px;border-radius:11px;border:1px solid rgba(16,40,28,.12);font-size:14.5px;font-family:inherit;background:#FAF9F6;color:#14211b;outline:none\"><option>Typ akcie<\u002Foption><option>Vystúpenie<\u002Foption><option>Súťaž<\u002Foption><option>Sústredenie<\u002Foption><\u002Fselect>\n              <button onclick=\"{{ formEvent.send }}\" style=\"margin-top:4px;padding:13px;border-radius:11px;font-size:14.5px;font-weight:600;color:#fff;background:#047b46\">Pridať do kalendára<\u002Fbutton>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ formEvent.sent }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:28px;border-radius:14px;background:rgba(4,123,70,.06)\">\n              <span style=\"font-size:30px\">✓<\u002Fspan><div style=\"font-size:15px style=\"opacity:1\">\n\n      <!-- HERO -->\n      <section style=\"position:relative;min-height:clamp(560px,90vh,920px);display:flex;align-items:flex-end;overflow:hidden;background:repeating-linear-gradient(125deg,#0a6b41 0 30px,#0c7547 30px 60px)\">\n        <image-slot id=\"hero-foto\" shape=\"rect\" fit=\"cover\" placeholder=\"Pretiahni sem hero fotku tímu (mažoretky)\" style=\"position:absolute;inset:0;width:100%;height:100%\"><\u002Fimage-slot>\n        <div style=\"position:absolute;inset:0;background:linear-gradient(115deg,rgba(3,68,40,.92) 0%,rgba(4,123,70,.36) 52%,rgba(3,72,42,.82) 100%);pointer-events:none\"><\u002Fdiv>\n        <sc-if value=\"{{ ornaments }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute;top:120px;left:clamp(24px,5vw,80px);width:120px;height:1px;background:linear-gradient(90deg,#0A9D5A,transparent)\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"position:relative;width:100%;max-width:1240px;margin:0 auto;padding:0 clamp(24px,5vw,80px) clamp(48px,7vw,96px)\">\n          <div style=\"max-width:760px;animation:fadeUp .7s ease both\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(12px,1.4vw,15px);letter-spacing:.34em;color:#9FE3C2;font-weight:600;text-transform:uppercase;margin-bottom:22px\">Mažoretky · Est. 2014<\u002Fdiv>\n            <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(46px,8vw,104px);line-height:.98;font-weight:600;color:#fff;letter-spacing:-.015em\">Elegancia<br>v každom pohybe<\u002Fh1>\n            <p style=\"margin-top:24px;font-size:clamp(16px,1.7vw,20px);line-height:1.6;color:rgba(255,255,255,.88);max-width:560px\">Súťažný mažoretkový tím MT&nbsp;Sorella. Disciplína, ladnosť a víťazný tímový duch — od juniorek až po seniorky.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:36px\">\n              <button onclick=\"{{ goMembers }}\" style=\"padding:16px 30px;border-radius:999px;font-size:15.5px;font-weight:600;color:#03331e;background:#fff;box-shadow:0 14px 36px -12px rgba(0,0,0,.5);transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">Spoznaj náš tím<\u002Fbutton>\n              <button onclick=\"{{ goGallery }}\" style=\"padding:16px 30px;border-radius:999px;font-size:15.5px;font-weight:600;color:#fff;background:rgba(255,255,255,.08);border:1.5px solid rgba(10,157,90,.6);transition:background .2s\" style-hover=\"background:rgba(10,157,90,.16)\">Pozri galériu<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:clamp(40px,6vw,68px);padding:18px clamp(18px,3vw,30px);border-radius:18px;background:rgba(255,255,255,.10);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.22);max-width:680px;animation:fadeUp .9s ease both\">\n            <sc-for list=\"{{ heroStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;min-width:120px;padding:6px 14px\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,3.4vw,40px);font-weight:700;color:#fff;line-height:1\">{{ s.num }}<\u002Fdiv>\n                <div style=\"margin-top:4px;font-size:12.5px;letter-spacing:.04em;color:rgba(255,255,255,.78)\">{{ s.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- O NÁS -->\n      <section style=\"max-width:1240px;margin:0 auto;padding:clamp(64px,9vw,128px) clamp(24px,5vw,80px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(36px,5vw,72px);align-items:center\">\n        <div>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Kto sme<\u002Fdiv>\n          <h2 style=\"margin-top:16px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,4.4vw,52px);line-height:1.05;font-weight:600;color:#14211b;letter-spacing:-.01em\">Tím, ktorý tancuje<br>so srdcom<\u002Fh2>\n          <p style=\"margin-top:22px;font-size:17px;line-height:1.75;color:#46544c\">MT&nbsp;Sorella je súťažný mažoretkový tím z Nitry, ktorý už viac ako desať rokov spája dievčatá milujúce pohyb, hudbu a disciplínu. Naše členky reprezentujú na domácich aj medzinárodných súťažiach.<\u002Fp>\n          <p style=\"margin-top:16px;font-size:17px;line-height:1.75;color:#46544c\">Veríme, že za každou medailou stojí poctivý tréning, vzájomná podpora a radosť z tanca. „Sorella\" znamená sestra — a presne tak sa k sebe správame.<\u002Fp>\n          <button onclick=\"{{ goAch }}\" style=\"margin-top:26px;display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#047b46;border-bottom:2px solid #0A9D5A;padding-bottom:3px\">Naše úspechy ›<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:4/5;border-radius:18px;overflow:hidden;box-shadow:0 30px 60px -24px rgba(16,40,28,.3)\">\n          <image-slot id=\"about-foto\" shape=\"rect\" fit=\"cover\" placeholder=\"Pretiahni sem fotku tímu (4:5)\" style=\"position:absolute;inset:0;width:100%;height:100%\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- NAJNOVŠIE ÚSPECHY -->\n      <section style=\"background:#fff;padding:clamp(64px,9vw,120px) clamp(24px,5vw,80px)\">\n        <div style=\"max-width:1240px;margin:0 auto\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:48px\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Ocenenia<\u002Fdiv>\n              <h2 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,4.4vw,52px);line-height:1.05;font-weight:600;color:#14211b\">Najnovšie úspechy<\u002Fh2>\n            <\u002Fdiv>\n            <button onclick=\"{{ goAch }}\" style=\"font-size:15px;font-weight:600;color:#047b46;border-bottom:2px solid #0A9D5A;padding-bottom:3px\">Celá časová os ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px\">\n            <sc-for list=\"{{ latestAchievements }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"position:relative;padding:30px;border-radius:18px;background:#FAF9F6;border:1px solid rgba(4,123,70,.08);transition:transform .3s,box-shadow .3s\" style-hover=\"transform:translateY(-6px);box-shadow:0 24px 44px -20px rgba(16,40,28,.24)\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                  <span style=\"display:grid;place-items:center;width:54px;height:54px;border-radius:14px;background:{{ a.medalBg }};font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;color:#047b46\">{{ a.medalIcon }}<\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#9aa89f\">{{ a.year }}<\u002Fspan>\n                <\u002Fdiv>\n                <h3 style=\"margin-top:20px;font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;color:#14211b;line-height:1.2\">{{ a.comp }}<\u002Fh3>\n                <div style=\"margin-top:8px;font-size:14px;font-weight:600;color:#047b46\">{{ a.place }}<\u002Fdiv>\n                <p style=\"margin-top:12px;font-size:14.5px;line-height:1.6;color:#5a6b62\">{{ a.desc }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- MAZORETKA MESIACA + TÍMOVÉ CIELE -->\n      <section style=\"max-width:1240px;margin:0 auto;padding:clamp(64px,9vw,120px) clamp(24px,5vw,80px);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:28px\">\n        <!-- mazoretka mesiaca -->\n        <div style=\"position:relative;border-radius:22px;overflow:hidden;background:linear-gradient(160deg,#047b46,#035C34);color:#fff;padding:0\">\n          <div style=\"padding:34px 34px 0\">\n            <div style=\"display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;background:rgba(10,157,90,.18);border:1px solid rgba(10,157,90,.4)\">\n              <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#9FE3C2;font-weight:600\">Mazoretka mesiaca<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:22px;align-items:flex-end;padding:24px 34px 34px\">\n            <div style=\"position:relative;flex-shrink:0;width:120px;height:150px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.2)\">\n              <image-slot id=\"motm-foto\" shape=\"rect\" fit=\"cover\" placeholder=\"foto\" style=\"position:absolute;inset:0;width:100%;height:100%\"><\u002Fimage-slot>\n            <\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:600;line-height:1.05\">{{ motm.name }}<\u002Fdiv>\n              <div style=\"margin-top:4px;font-size:14px;color:#9FE3C2\">„{{ motm.nick }}\" · {{ motm.cat }}<\u002Fdiv>\n              <p style=\"margin-top:14px;font-size:14.5px;line-height:1.6;color:rgba(255,255,255,.86)\">{{ motm.reason }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- tímové ciele -->\n        <div style=\"border-radius:22px;background:#fff;border:1px solid rgba(4,123,70,.1);padding:34px;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(16,40,28,.04),0 18px 40px -22px rgba(16,40,28,.16)\">\n          <div style=\"display:inline-flex;align-items:center;gap:8px;align-self:flex-start;padding:7px 14px;border-radius:999px;background:rgba(4,123,70,.08)\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#047b46;font-weight:600\">Tímový cieľ<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"margin-top:20px;font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:600;color:#14211b;line-height:1.15\">{{ goal.title }}<\u002Fh3>\n          <p style=\"margin-top:8px;font-size:14.5px;color:#5a6b62;line-height:1.6\">Keď spoločne nazbierame {{ goal.targetFmt }} bodov, čaká nás tímová odmena.<\u002Fp>\n          <div style=\"margin-top:auto;padding-top:26px\">\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px\">\n              <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;color:#047b46\">{{ goal.currentFmt }}<\u002Fspan>\n              <span style=\"font-size:14px;color:#9aa89f\">/ {{ goal.targetFmt }} b<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative;height:14px;border-radius:999px;background:#eef2ef;overflow:hidden\">\n              <div style=\"position:absolute;inset:0;width:{{ goal.pct }}%;background:linear-gradient(90deg,#0A9D5A,#047b46);border-radius:999px\"><\u002Fdiv>\n              <div style=\"position:absolute;top:0;bottom:0;left:calc({{ goal.pct }}% - 3px);width:3px;background:#0A9D5A\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:10px;font-size:13px;color:#047b46;font-weight:600\">{{ goal.pct }}% splnené · ešte {{ goal.remainFmt }} bodov<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- GALÉRIA PREVIEW -->\n      <section style=\"background:#fff;padding:clamp(64px,9vw,120px) clamp(24px,5vw,80px)\">\n        <div style=\"max-width:1240px;margin:0 auto\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:40px\">\n            <div>\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Momentky<\u002Fdiv>\n              <h2 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,4.4vw,52px);line-height:1.05;font-weight:600;color:#14211b\">Z našej galérie<\u002Fh2>\n            <\u002Fdiv>\n            <button onclick=\"{{ goGallery }}\" style=\"font-size:15px;font-weight:600;color:#047b46;border-bottom:2px solid #0A9D5A;padding-bottom:3px\">Celá galéria ›<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));grid-auto-rows:200px;gap:14px\">\n            <sc-for list=\"{{ galleryPreview }}\" as=\"g\" hint-placeholder-count=\"6\">\n              <button onclick=\"{{ g.open }}\" style=\"position:relative;grid-row:span {{ g.span }};border-radius:14px;overflow:hidden;background:{{ g.bg }};cursor:pointer\">\n                <div style=\"position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8aa093;text-transform:uppercase\">[ {{ g.label }} ]<\u002Fdiv>\n                <div style=\"position:absolute;inset:0;background:linear-gradient(to top,rgba(3,72,42,.55),transparent 55%);opacity:0;transition:opacity .3s\" style-hover=\"opacity:1\"><\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- NADCHÁDZAJÚCE VYSTÚPENIA -->\n      <section style=\"max-width:1240px;margin:0 auto;padding:clamp(64px,9vw,120px) clamp(24px,5vw,80px)\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:40px\">\n          <div>\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Kalendár<\u002Fdiv>\n            <h2 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,4.4vw,52px);line-height:1.05;font-weight:600;color:#14211b\">Nadchádzajúce vystúpenia<\u002Fh2>\n          <\u002Fdiv>\n          <button onclick=\"{{ goEvents }}\" style=\"font-size:15px;font-weight:600;color:#047b46;border-bottom:2px solid #0A9D5A;padding-bottom:3px\">Všetky akcie ›<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ upcomingEvents }}\" as=\"e\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:20px;padding:22px 26px;border-radius:16px;background:#fff;border:1px solid rgba(4,123,70,.08);transition:transform .25s\" style-hover=\"transform:translateX(6px)\">\n              <div style=\"flex-shrink:0;text-align:center;width:64px\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:700;color:#047b46;line-height:1\">{{ e.day }}<\u002Fdiv>\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9aa89f\">{{ e.month }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;align-self:stretch;background:rgba(4,123,70,.1)\"><\u002Fdiv>\n              <div style=\"flex:1;min-width:200px\">\n                <div style=\"font-size:17px;font-weight:600;color:#14211b\">{{ e.title }}<\u002Fdiv>\n                <div style=\"margin-top:3px;font-size:14px;color:#5a6b62\">{{ e.where }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"padding:6px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:{{ e.tagColor }};background:{{ e.tagBg }}\">{{ e.tag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SPONZORI -->\n      <section style=\"background:#03331e;padding:clamp(56px,8vw,100px) clamp(24px,5vw,80px)\">\n        <div style=\"max-width:1240px;margin:0 auto;text-align:center\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#9FE3C2;font-weight:600\">Ďakujeme<\u002Fdiv>\n          <h2 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600;color:#fff\">Naši partneri a sponzori<\u002Fh2>\n          <div style=\"margin-top:44px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px\">\n            <sc-for list=\"{{ sponsors }}\" as=\"sp\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid;place-items:center;height:88px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(255,255,255,.55);transition:background .25s\" style-hover=\"background:rgba(255,255,255,.1)\">{{ sp.name }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ goPartner }}\" style=\"margin-top:36px;padding:14px 28px;border-radius:999px;font-size:14.5px;font-weight:600;color:#047b46;background:#fff;transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">Staňte sa partnerom<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== GALÉRIA ===================== -->\n    <sc-if value=\"{{ isGallery }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:#fff;padding:clamp(48px,7vw,90px) clamp(24px,5vw,80px) clamp(32px,4vw,48px);border-bottom:1px solid rgba(4,123,70,.08)\">\n        <div style=\"max-width:1240px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Galéria<\u002Fdiv>\n          <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600;color:#14211b;letter-spacing:-.01em\">Naše momentky<\u002Fh1>\n          <p style=\"margin-top:12px;font-size:16px;color:#5a6b62;max-width:560px\">Fotografie zo súťaží, tréningov a vystúpení. Kliknutím otvoríte detail.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:28px\">\n            <sc-for list=\"{{ galleryCats }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ c.pick }}\" style=\"padding:9px 18px;border-radius:999px;font-size:14px;font-weight:600;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.bd }};transition:all .2s\">{{ c.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1240px;margin:0 auto;padding:clamp(32px,4vw,56px) clamp(24px,5vw,80px) clamp(64px,8vw,110px)\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));grid-auto-rows:220px;gap:16px\">\n          <sc-for list=\"{{ galleryItems }}\" as=\"g\" hint-placeholder-count=\"9\">\n            <button onclick=\"{{ g.open }}\" style=\"position:relative;grid-row:span {{ g.span }};border-radius:16px;overflow:hidden;background:{{ g.bg }};cursor:pointer;transition:transform .3s\" style-hover=\"transform:scale(.985)\">\n              <div style=\"position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:#8aa093;text-transform:uppercase\">[ {{ g.label }} ]<\u002Fdiv>\n              <div style=\"position:absolute;left:0;right:0;bottom:0;padding:14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(3,72,42,.7),transparent);opacity:0;transition:opacity .3s\" style-hover=\"opacity:1\">\n                <span style=\"font-size:12px;font-weight:600;color:#fff\">{{ g.cat }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.8)\">{{ g.year }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== ÚSPECHY ===================== -->\n    <sc-if value=\"{{ isAchievements }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:linear-gradient(160deg,#047b46,#035C34);color:#fff;padding:clamp(48px,7vw,96px) clamp(24px,5vw,80px)\">\n        <div style=\"max-width:1240px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#9FE3C2;font-weight:600\">Ocenenia<\u002Fdiv>\n          <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600\">Časová os úspechov<\u002Fh1>\n          <div style=\"margin-top:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:18px\">\n            <sc-for list=\"{{ achStats }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <div style=\"padding:22px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(30px,3.6vw,42px);font-weight:700;color:#fff;line-height:1\">{{ st.num }}<\u002Fdiv>\n                <div style=\"margin-top:6px;font-size:13px;color:rgba(255,255,255,.78)\">{{ st.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:920px;margin:0 auto;padding:clamp(48px,6vw,90px) clamp(24px,5vw,40px)\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:44px\">\n          <sc-for list=\"{{ achFilters }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ f.pick }}\" style=\"padding:9px 18px;border-radius:999px;font-size:14px;font-weight:600;background:{{ f.bg }};color:{{ f.color }};border:1px solid {{ f.bd }};transition:all .2s\">{{ f.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding-left:36px\">\n          <div style=\"position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(#0A9D5A,rgba(4,123,70,.2))\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:22px\">\n            <sc-for list=\"{{ achTimeline }}\" as=\"a\" hint-placeholder-count=\"4\">\n              <div style=\"position:relative\">\n                <span style=\"position:absolute;left:-31px;top:24px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid #0A9D5A\"><\u002Fspan>\n                <div style=\"padding:26px 28px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.08);box-shadow:0 14px 34px -22px rgba(16,40,28,.2);transition:transform .25s\" style-hover=\"transform:translateX(5px)\">\n                  <div style=\"display:flex;align-items:center;gap:14px\">\n                    <span style=\"display:grid;place-items:center;width:50px;height:50px;border-radius:13px;background:{{ a.medalBg }};font-size:24px\">{{ a.medalIcon }}<\u002Fspan>\n                    <div style=\"flex:1\">\n                      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px\">\n                        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#9aa89f\">{{ a.year }}<\u002Fspan>\n                        <span style=\"padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;color:#047b46;background:rgba(4,123,70,.08)\">{{ a.type }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <h3 style=\"margin-top:5px;font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b;line-height:1.2\">{{ a.comp }}<\u002Fh3>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"margin-top:14px;font-size:14.5px;font-weight:700;color:#047b46\">{{ a.place }}<\u002Fdiv>\n                  <p style=\"margin-top:8px;font-size:14.5px;line-height:1.6;color:#5a6b62\">{{ a.desc }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== TRÉNERI (verejné) ===================== -->\n    <sc-if value=\"{{ isMembers }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:#fff;padding:clamp(48px,7vw,90px) clamp(24px,5vw,80px) clamp(28px,4vw,44px);border-bottom:1px solid rgba(4,123,70,.08)\">\n        <div style=\"max-width:1080px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Náš tím<\u002Fdiv>\n          <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600;color:#14211b\">Tréneri a vedenie<\u002Fh1>\n          <p style=\"margin-top:14px;font-size:16.5px;line-height:1.7;color:#5a6b62;max-width:560px\">Za úspechmi MT&nbsp;Sorella stojí skúsené trénerské vedenie. Profily našich členiek sú z dôvodu ochrany súkromia prístupné len v členskej zóne.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1080px;margin:0 auto;padding:clamp(40px,6vw,72px) clamp(24px,5vw,80px)\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:26px\">\n          <sc-for list=\"{{ trainersList }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <div style=\"border-radius:20px;overflow:hidden;background:#fff;border:1px solid rgba(4,123,70,.08);box-shadow:0 14px 36px -26px rgba(16,40,28,.3)\">\n              <div style=\"position:relative;aspect-ratio:3/2;background:repeating-linear-gradient(135deg,#e9efe9 0 16px,#e0e7e1 16px 32px)\">\n                <div style=\"position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#8aa093;text-transform:uppercase\">[ foto trénerky 3:2 ]<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:26px\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:23px;font-weight:600;color:#14211b\">{{ t.name }}<\u002Fdiv>\n                <div style=\"margin-top:4px;display:inline-block;padding:4px 12px;border-radius:999px;font-size:12.5px;font-weight:600;color:#047b46;background:rgba(4,123,70,.08)\">{{ t.role }} · {{ t.years }} r.<\u002Fdiv>\n                <p style=\"margin-top:14px;font-size:14.5px;line-height:1.65;color:#5a6b62\">{{ t.bio }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:44px;padding:clamp(28px,4vw,48px);border-radius:22px;background:linear-gradient(150deg,#047b46,#035C34);color:#fff;text-align:center\">\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(24px,3.4vw,38px);font-weight:600\">Chceš tancovať s nami?<\u002Fh2>\n          <p style=\"margin-top:12px;font-size:16px;color:rgba(255,255,255,.85);max-width:520px;margin-left:auto;margin-right:auto\">Prijímame nové dievčatá do juniorskej kategórie. Podaj nezáväznú online prihlášku.<\u002Fp>\n          <button onclick=\"{{ goApply }}\" style=\"margin-top:24px;padding:14px 30px;border-radius:999px;font-size:15px;font-weight:600;color:#047b46;background:#fff;transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">Online prihláška<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== TÍM (členská zóna) ===================== -->\n    <sc-if value=\"{{ isTeam }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1;max-width:1240px;margin:0 auto;padding:clamp(28px,4vw,52px) clamp(20px,4vw,64px) 64px\">\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#047b46;font-weight:600\">Členská zóna<\u002Fdiv>\n      <h1 style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:600;color:#14211b\">Naše členky<\u002Fh1>\n      <p style=\"margin-top:10px;font-size:15px;color:#5a6b62\">Kompletný prehľad tímu. Kliknutím na členku zobrazíš jej profil.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:24px\">\n        <sc-for list=\"{{ memberCats }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ c.pick }}\" style=\"padding:9px 18px;border-radius:999px;font-size:14px;font-weight:600;background:{{ c.bg }};color:{{ c.color }};border:1px solid {{ c.bd }};transition:all .2s\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:22px\">\n        <sc-for list=\"{{ membersGrid }}\" as=\"m\" hint-placeholder-count=\"8\">\n          <button onclick=\"{{ m.open }}\" style=\"text-align:left;border-radius:18px;overflow:hidden;background:#fff;border:1px solid rgba(4,123,70,.08);cursor:pointer;transition:transform .3s,box-shadow .3s\" style-hover=\"transform:translateY(-6px);box-shadow:0 26px 46px -24px rgba(16,40,28,.28)\">\n            <div style=\"position:relative;aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#e9efe9 0 16px,#e0e7e1 16px 32px)\">\n              <div style=\"position:absolute;inset:0;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#8aa093;text-transform:uppercase\">[ foto 4:5 ]<\u002Fdiv>\n              <sc-if value=\"{{ m.role }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;top:12px;left:12px;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:600;color:#03331e;background:#0A9D5A\">{{ m.role }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"padding:18px 18px 20px\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">{{ m.name }}<\u002Fdiv>\n              <div style=\"margin-top:2px;font-size:14px;color:#5a6b62\">„{{ m.nick }}\" · {{ m.cat }}<\u002Fdiv>\n              <div style=\"margin-top:12px;display:flex;align-items:center;gap:7px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ m.dot }}\"><\u002Fspan>\n                <span style=\"font-size:12.5px;font-weight:600;color:#46544c\">{{ m.levelName }}<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12.5px;color:#9aa89f\">{{ m.years }}. rok<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== VYSTÚPENIA ===================== -->\n    <sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:#fff;padding:clamp(48px,7vw,90px) clamp(24px,5vw,80px) clamp(28px,4vw,40px);border-bottom:1px solid rgba(4,123,70,.08)\">\n        <div style=\"max-width:1080px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Kalendár<\u002Fdiv>\n          <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600;color:#14211b\">Vystúpenia a akcie<\u002Fh1>\n          <button onclick=\"{{ exportAllEvents }}\" style=\"margin-top:18px;padding:11px 20px;border-radius:11px;font-size:13.5px;font-weight:600;color:#047b46;border:1px solid rgba(4,123,70,.22);transition:background .2s\" style-hover=\"background:rgba(4,123,70,.06)\">Export všetkých do kalendára (.ics)<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1080px;margin:0 auto;padding:clamp(40px,5vw,72px) clamp(24px,5vw,80px)\">\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <sc-for list=\"{{ eventsFull }}\" as=\"e\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:22px;padding:26px 30px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.08);box-shadow:0 14px 32px -24px rgba(16,40,28,.2)\">\n              <div style=\"flex-shrink:0;text-align:center;width:72px;padding:14px 0;border-radius:14px;background:rgba(4,123,70,.06)\">\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:700;color:#047b46;line-height:1\">{{ e.day }}<\u002Fdiv>\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9aa89f;margin-top:2px\">{{ e.month }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:220px\">\n                <span style=\"display:inline-block;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;color:{{ e.tagColor }};background:{{ e.tagBg }}\">{{ e.tag }}<\u002Fspan>\n                <div style=\"margin-top:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:600;color:#14211b\">{{ e.title }}<\u002Fdiv>\n                <div style=\"margin-top:5px;font-size:14.5px;color:#5a6b62\">{{ e.where }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ e.ics }}\" style=\"flex-shrink:0;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;color:#047b46;border:1.5px solid rgba(4,123,70,.2);transition:background .2s\" style-hover=\"background:rgba(4,123,70,.06)\">+ Do kalendára<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== SPONZORI ===================== -->\n    <sc-if value=\"{{ isSponsors }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"background:#fff;padding:clamp(48px,7vw,90px) clamp(24px,5vw,80px) clamp(28px,4vw,40px);border-bottom:1px solid rgba(4,123,70,.08)\">\n        <div style=\"max-width:1080px;margin:0 auto\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Ďakujeme<\u002Fdiv>\n          <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600;color:#14211b\">Partneri a sponzori<\u002Fh1>\n          <p style=\"margin-top:12px;font-size:16px;color:#5a6b62;max-width:560px\">Bez podpory našich partnerov by sme nemohli reprezentovať. Ďakujeme.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1080px;margin:0 auto;padding:clamp(40px,5vw,72px) clamp(24px,5vw,80px)\">\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px\">\n          <sc-for list=\"{{ sponsorsFull }}\" as=\"sp\" hint-placeholder-count=\"6\">\n            <div style=\"padding:26px;border-radius:18px;background:#fff;border:1px solid rgba(4,123,70,.08);transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 42px -24px rgba(16,40,28,.24)\">\n              <div style=\"display:grid;place-items:center;height:72px;border-radius:12px;background:#FAF9F6;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;color:#7a8a80\">{{ sp.name }}<\u002Fdiv>\n              <p style=\"margin-top:16px;font-size:14.5px;line-height:1.6;color:#5a6b62\">{{ sp.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:48px;padding:clamp(32px,5vw,56px);border-radius:22px;background:linear-gradient(150deg,#047b46,#035C34);color:#fff;text-align:center\">\n          <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(24px,3.4vw,38px);font-weight:600\">Chcete podporiť MT Sorella?<\u002Fh2>\n          <p style=\"margin-top:12px;font-size:16px;color:rgba(255,255,255,.85);max-width:520px;margin-left:auto;margin-right:auto\">Staňte sa partnerom tímu a podporte mladé talenty. Ozvite sa nám.<\u002Fp>\n          <button onclick=\"{{ goPartner }}\" style=\"margin-top:26px;padding:14px 30px;border-radius:999px;font-size:15px;font-weight:600;color:#047b46;background:#fff;transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">Staňte sa partnerom<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== KONTAKT ===================== -->\n    <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"opacity:1\">\n      <section style=\"max-width:1240px;margin:0 auto;padding:clamp(48px,7vw,90px) clamp(24px,5vw,80px) clamp(64px,8vw,110px)\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#047b46;font-weight:600\">Spojme sa<\u002Fdiv>\n        <h1 style=\"margin-top:14px;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(34px,5vw,60px);font-weight:600;color:#14211b\">Kontakt<\u002Fh1>\n        <div style=\"margin-top:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px\">\n          <div style=\"padding:clamp(24px,3vw,36px);border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.08)\">\n            <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:600;color:#14211b\">Napíšte nám<\u002Fh2>\n            <p style=\"margin-top:8px;font-size:14px;color:#5a6b62\">Máte záujem o členstvo alebo spoluprácu? Vyplňte formulár.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:24px\">\n              <input placeholder=\"Meno a priezvisko\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <input placeholder=\"E-mail\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n              <textarea placeholder=\"Vaša správa\" rows=\"4\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none;resize:vertical\"><\u002Ftextarea>\n              <button style=\"padding:15px;border-radius:12px;font-size:15px;font-weight:600;color:#fff;background:#047b46;transition:background .2s\" style-hover=\"background:#035C34\">Odoslať správu<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:20px\">\n            <div style=\"padding:28px;border-radius:20px;background:#fff;border:1px solid rgba(4,123,70,.08)\">\n              <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:600;color:#14211b\">Kde nás nájdete<\u002Fh3>\n              <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:12px;font-size:15px;color:#46544c\">\n                <div>Telocvičňa ZŠ Komenského, 949 01 Nitra<\u002Fdiv>\n                <div>info@mtsorella.sk< radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none\">\n            <\u002Fdiv>\n            <textarea placeholder=\"Predchádzajúce skúsenosti s tancom (nepovinné)\" rows=\"3\" style=\"padding:14px 16px;border-radius:12px;border:1px solid rgba(4,123,70,.16);font-size:15px;font-family:inherit;background:#FAF9F6;outline:none;resize:vertical\"><\u002Ftextarea>\n            <label style=\"display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.5;color:#5a6b62\"><input type=\"checkbox\" style=\"margin-top:2px;width:16px;height:16px;accent-color:#047b46;flex-shrink:0\"> Súhlasím so spracovaním osobných údajov za účelom vybavenia prihlášky.<\u002Flabel>\n            <button onclick=\"{{ formApply.send }}\" style=\"margin-top:6px;padding:15px;border-radius:12px;font-size:15px;font-weight:600;color:#fff;background:#047b46;box-shadow:0 10px 26px -10px rgba(4,123,70,.6);transition:background .2s\" style-hover=\"background:#035C34\">Odoslať prihlášku<\u002Fbutton>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ formApply.sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:32px 12px\">\n            <span style=\"display:grid;place-items:center;width:64px;height:64px;border-radius:50%;background:rgba(4,123,70,.1);font-size:30px\">✓<\u002Fspan>\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:600;color:#14211b\">Prihláška odoslaná!<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.6;color:#5a6b62;max-width:340px\">Ďakujeme za záujem o MT&nbsp;Sorella. Ozveme sa ti na uvedený e-mail do niekoľkých dní.<\u002Fp>\n            <button onclick=\"{{ formApply.reset }}\" style=\"margin-top:6px;padding:11px 20px;border-radius:11px;font-size:14px;font-weight:600;color:#047b46;border:1px solid rgba(4,123,70,.2)\">Odo
