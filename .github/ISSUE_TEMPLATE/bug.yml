name: "🐞 Bug"
description: "Something isn't working"
title: "bug: <summary>"
labels: ["type:bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: ["backend", "frontend", "ci", "skills", "repo"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["high", "medium", "low"]
    validations:
      required: true
